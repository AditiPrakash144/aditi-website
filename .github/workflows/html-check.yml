name: HTML Validator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install tidy (HTML validator)
      run: sudo apt-get install -y tidy

    - name: Run HTML tidy check
      run: tidy -e index.html || true
